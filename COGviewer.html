<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparativa Ortofotos 15GB</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html, #map { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        
        /* Convertimos el slider en una línea divisoria vertical profesional */
        #swipe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            appearance: none;
            background: transparent;
            pointer-events: none; /* Permite arrastrar el mapa al hacer clic fuera de la línea */
            z-index: 10;
        }
        /* El "pulgar" del deslizador (la barra blanca) */
        #swipe::-webkit-slider-thumb {
            appearance: none;
            pointer-events: auto; /* Solo la línea central captura los clics */
            width: 4px;
            height: 100vh;
            background: white;
            cursor: ew-resize;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        #swipe::-moz-range-thumb {
            pointer-events: auto;
            width: 4px;
            height: 100vh;
            background: white;
            cursor: ew-resize;
            border: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- Valor al 50% para que empiece exactamente a la mitad -->
    <input id="swipe" type="range" value="50">

<!-- 1. Librería necesaria para leer los archivos GeoTIFF en el navegador -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    
    <!-- 2. OpenLayers -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    
    <script>
        // Tu código JavaScript aquí...    <script>
        // 1. FUENTES DE DATOS
        const sourceAntes = new ol.source.GeoTIFF({
            sources: [{ url: 'visor/2025_N.tif' }] // <--- Tu archivo del ANTES
        });

        const sourceDespues = new ol.source.GeoTIFF({
            sources: [{ url: 'visor/2026_N.tif' }] // <--- Tu archivo del DESPUÉS
        });

        // 2. CAPAS
        const antesLayer = new ol.layer.WebGLTile({ source: sourceAntes });
        const despuesLayer = new ol.layer.WebGLTile({ source: sourceDespues });

        // 3. MAPA
        const map = new ol.Map({
            target: 'map',
            layers: [antesLayer, despuesLayer],
            // Usamos getView() del GeoTIFF para que automáticamente ajuste 
            // la proyección, el centro y el zoom a los límites de la imagen
            view: sourceAntes.getView() 
        });

        // 4. LÓGICA DEL SLIDER (SWIPE)
        const swipe = document.getElementById('swipe');

        despuesLayer.on('prerender', (event) => {
            const gl = event.context;
            gl.enable(gl.SCISSOR_TEST);

            const mapSize = map.getSize(); // [ancho, alto] en píxeles CSS

            // Obtenemos los píxeles de renderizado (necesario si hay distintas densidades de pantalla/Retina)
            const bottomLeft = ol.render.getRenderPixel(event, [0, mapSize[1]]);
            const topRight = ol.render.getRenderPixel(event, [mapSize[0], 0]);

            // Calculamos en qué punto X (píxel) está el control deslizante
            const swipePixelX = mapSize[0] * (swipe.value / 100);
            const renderSwipeX = ol.render.getRenderPixel(event, [swipePixelX, 0])[0];

            // Renderizamos la capa "Después" solo a la DERECHA del deslizador
            const width = topRight[0] - renderSwipeX;
            const height = topRight[1] - bottomLeft[1];

            gl.scissor(renderSwipeX, bottomLeft[1], width, height);
        });

        despuesLayer.on('postrender', (event) => {
            const gl = event.context;
            gl.disable(gl.SCISSOR_TEST);
        });

        // Forzar la actualización del mapa al mover el slider
        swipe.addEventListener('input', () => map.render());
    </script>
</body>
</html>
